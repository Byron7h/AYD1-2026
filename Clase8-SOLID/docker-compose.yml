# docker-compose.yml
#
# Cómo se comunican los contenedores:
#
#   Tu máquina:   localhost:5173 → frontend (nginx)
#                 localhost:3000 → backend  (node)
#
#   Dentro de Docker (red solid-network):
#     frontend llama a http://backend:3000 (por nombre de servicio)
#     backend llama a Neon directamente (BD externa)
#
#   "solid-network" es el puente. Sin ella los contenedores
#   no se ven entre sí. Con ella se llaman por nombre.

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: solid-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
    networks:
      - solid-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: solid-frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - solid-network
    restart: unless-stopped

networks:
  solid-network:
    driver: bridge
