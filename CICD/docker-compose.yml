version: '3.9'
services:
  backend:
    build: ./backend
    container_name: cicd-demo-backend
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    container_name: cicd-demo-frontend
    ports:
      - "8080:8080"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend
