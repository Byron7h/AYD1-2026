name: tests

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Pruebas-Unitarias/package-lock.json

      - name: install
        working-directory: Pruebas-Unitarias
        run: npm ci

      - name: run tests
        working-directory: Pruebas-Unitarias
        run: npm test

      - name: coverage
        working-directory: Pruebas-Unitarias
        run: npm run test:coverage
