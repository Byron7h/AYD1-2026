name: Backend CI/CD

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    # Build stage: valida que el backend compile dependencias y construye la imagen Docker.
    steps:
      - name: "📥 Checkout del codigo"
        uses: actions/checkout@v4

      - name: "🟢 Configurar Node.js 22"
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: "📦 Instalar dependencias del backend"
        run: |
          cd CICD/backend
          npm ci

      - name: "🐳 Build de imagen Docker del backend"
        run: docker build -t cicd-demo-backend ./CICD/backend

  test:
    runs-on: ubuntu-latest
    needs: build
    # Si falla el test stage, el pipeline se detiene y no llega al deploy.
    steps:
      - name: "📥 Checkout del codigo"
        uses: actions/checkout@v4

      - name: "🟢 Configurar Node.js 22"
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: "🧪 Ejecutar pruebas Jest"
        run: |
          cd CICD/backend
          npm install
          npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    # Nivel 1 activo: deploy temporal en runner para demostrar el flujo CI/CD completo.
    steps:
      - name: "📥 Checkout del codigo"
        uses: actions/checkout@v4

      - name: "🟢 Configurar Node.js 22"
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: "🚀 Deploy Nivel 1 (temporal en runner)"
        run: |
          cd CICD/backend
          npm install --omit=dev
          npm start &
          sleep 3
          curl http://localhost:3000/health
          echo "✅ Backend corriendo en el runner"

    # Nivel 1 es temporal: al terminar el job, el proceso desaparece.
    # En produccion real se usa el Nivel 2 con Cloud Run.

