name: Backend CI/CD

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    # Build stage: valida que el backend compile dependencias y construye la imagen Docker.
    steps:
      - name: "📥 Checkout del codigo"
        uses: actions/checkout@v4

      - name: "🟢 Configurar Node.js 22"
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: "📦 Instalar dependencias del backend"
        run: |
          cd CICD/backend
          npm ci

      - name: "🐳 Build de imagen Docker del backend"
        run: docker build -t cicd-demo-backend ./CICD/backend

  test:
    runs-on: ubuntu-latest
    needs: build
    # Si falla el test stage, el pipeline se detiene y no llega al deploy.
    steps:
      - name: "📥 Checkout del codigo"
        uses: actions/checkout@v4

      - name: "🟢 Configurar Node.js 22"
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: "🧪 Ejecutar pruebas Jest"
        run: |
          cd CICD/backend
          npm install
          npm test
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: "📥 Checkout del codigo"
        uses: actions/checkout@v4

      - name: "🔐 Autenticar con GCP"
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: "🛠️ Configurar gcloud"
        uses: google-github-actions/setup-gcloud@v2

      - name: "🐳 Build y push a Google Container Registry"
        run: |
          gcloud auth configure-docker --quiet
          docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/cicd-demo-backend:latest ./CICD/backend
          docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/cicd-demo-backend:latest

      - name: "☁️ Deploy a Cloud Run"
        run: |
          gcloud run deploy cicd-demo-backend \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/cicd-demo-backend:latest \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars DATABASE_URL=${{ secrets.DATABASE_URL }},PORT=3000
